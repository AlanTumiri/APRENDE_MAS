<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Ingeniería de Sistemas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-container">
        
        <div class="brand-section">
            <h1>Ingeniería de Sistemas</h1>
            <p class="subtitle">Plataforma de Aprendizaje Guiado</p>
        </div>

        <div class="glass-card login-box">
            <div class="tabs">
                <button class="tab active" id="btn-login" onclick="cambiarTab('login')">Iniciar Sesión</button>
                <button class="tab" id="btn-registro" onclick="cambiarTab('registro')">Registrarse</button>
            </div>

            <form id="form-login" class="form-active" onsubmit="iniciarSesion(event)">
                <h2>Bienvenido de nuevo 🚀</h2>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="estudiante@universidad.edu" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary full-width">Ingresar a mis materias</button>
            </form>

            <form id="form-registro" class="form-hidden" onsubmit="registrar(event)">
                <h2>Crea tu cuenta 🎓</h2>
                <div class="input-group">
                    <label for="reg-nombre">Nombre Completo</label>
                    <input type="text" id="reg-nombre" placeholder="Ej. Alan Tumiri" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="estudiante@universidad.edu" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
                <button type="submit" class="btn-primary full-width">Crear Cuenta</button>
            </form>

            <div class="guest-section">
                <p>¿Solo quieres explorar?</p>
               <button type="button" onclick="window.location.href='inicio.html'" class="btn-outline full-width">Entrar como Invitado</button>
            </div>
        </div>

    </div>

    <script src="login.js"></script>
</body>
</html>
